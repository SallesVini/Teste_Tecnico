<div class="container mt-4">

  <h2>Usuários</h2>

  <table class="table table-hover table-striped">

    <thead class="table-dark">
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Cidade</th>
        <th>Empresa</th>
      </tr>
    </thead>

    <tbody style="cursor: pointer;">
      <tr *ngFor="let usuario of usuario"
          (click)="carregarPosts(usuario.id)"
          data-bs-toggle="modal"
          data-bs-target="#modalPosts">

        <td>{{ usuario.nome }}</td>
        <td>{{ usuario.email }}</td>
        <td>{{ usuario.cidade }}</td>
        <td>{{ usuario.empresa }}</td>
      </tr>
    </tbody>

  </table>



  <!-- Modal para listar posts do usuário -->
   <div class="modal fade" id="modalPosts">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Posts do usuário</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <table class="table table-striped">

          <thead>
            <tr>
              <th>Id do usuário</th>
              <th>Título</th>
              <th>Conteúdo</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let post of posts">
              <td>{{ post.userId }}</td>
              <td>{{ post.title }}</td>
              <td>{{ post.body }}</td>

            </tr>
          </tbody>

        </table>

      </div>

    </div>
  </div>
</div>

</div>
